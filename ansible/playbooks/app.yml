---
# Configure the application server: Java runtime, nginx, and the ERP backend.
- name: Configure ERP application server
  hosts: app
  become: true
  vars:
    app_user: erp
    app_dir: /opt/erp
    jar_name: erp-system-1.0.0.jar
    backend_port: 8080
    db_host: "{{ db_private_ip }}"
    db_name: "{{ mysql_database | default('erp') }}"
    db_user: "{{ mysql_app_user | default('erp_app') }}"
    # db_password must be passed as an extra-var.

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Java runtime and nginx
      ansible.builtin.apt:
        name:
          - openjdk-17-jre-headless
          - nginx
        state: present

    - name: Create service user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ app_dir }}"

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy backend JAR
      ansible.builtin.copy:
        src: "files/{{ jar_name }}"
        dest: "{{ app_dir }}/{{ jar_name }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      notify: Restart ERP backend

    - name: Install systemd unit for the backend
      ansible.builtin.template:
        src: templates/erp-backend.service.j2
        dest: /etc/systemd/system/erp-backend.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart ERP backend

    - name: Configure nginx reverse proxy
      ansible.builtin.template:
        src: templates/nginx-erp.conf.j2
        dest: /etc/nginx/sites-available/erp.conf
        mode: "0644"
      notify: Restart nginx

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/erp.conf
        dest: /etc/nginx/sites-enabled/erp.conf
        state: link
      notify: Restart nginx

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart nginx

    - name: Ensure backend is running and enabled
      ansible.builtin.systemd:
        name: erp-backend
        state: started
        enabled: true
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart ERP backend
      ansible.builtin.service:
        name: erp-backend
        state: restarted

    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
