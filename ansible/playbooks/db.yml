---
# Configure the dedicated MySQL database server.
- name: Configure MySQL database server
  hosts: db
  become: true
  # Run handlers even if a later task fails, so a notified MySQL restart
  # is never skipped (otherwise a bind-address change can be left unapplied).
  force_handlers: true
  # mysql_database and mysql_app_user come from the inventory [all:vars].
  # mysql_root_password and mysql_app_password must be passed as extra-vars.

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install MySQL server and Python client
      ansible.builtin.apt:
        name:
          - mysql-server
          - python3-pymysql
        state: present

    - name: Ensure MySQL is running and enabled
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: true

    - name: Bind MySQL to all interfaces (reachable from the app subnet)
      ansible.builtin.lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
      notify: Restart MySQL

    - name: Check what MySQL is currently listening on
      ansible.builtin.command: ss -tlnH 'sport = :3306'
      register: mysql_listen
      changed_when: false

    - name: Restart MySQL if it is not yet bound to all interfaces
      ansible.builtin.service:
        name: mysql
        state: restarted
      when: "'0.0.0.0:3306' not in mysql_listen.stdout"

    - name: Set MySQL root password (idempotent; fresh install or already set)
      community.mysql.mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        host: localhost
        check_implicit_admin: true
        login_user: root
        login_password: "{{ mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock
        state: present

    - name: Write root credentials file for idempotent re-runs
      ansible.builtin.copy:
        dest: /root/.my.cnf
        owner: root
        group: root
        mode: "0600"
        content: |
          [client]
          user=root
          password={{ mysql_root_password }}

    - name: Create application database
      community.mysql.mysql_db:
        name: "{{ mysql_database }}"
        state: present

    - name: Copy schema to the database server
      ansible.builtin.copy:
        src: ../../db/schema.sql
        dest: /tmp/schema.sql
        mode: "0644"

    - name: Load schema into the database
      community.mysql.mysql_db:
        name: "{{ mysql_database }}"
        state: import
        target: /tmp/schema.sql

    - name: Create application user (accessible from the VNet/VPC)
      community.mysql.mysql_user:
        name: "{{ mysql_app_user }}"
        password: "{{ mysql_app_password }}"
        host: "%"
        priv: "{{ mysql_database }}.*:ALL"
        state: present

  handlers:
    - name: Restart MySQL
      ansible.builtin.service:
        name: mysql
        state: restarted
