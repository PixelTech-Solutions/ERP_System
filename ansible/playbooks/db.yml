---
# Configure the dedicated MySQL database server.
- name: Configure MySQL database server
  hosts: db
  become: true
  # mysql_database and mysql_app_user come from the inventory [all:vars].
  # mysql_root_password and mysql_app_password must be passed as extra-vars.

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install MySQL server and Python client
      ansible.builtin.apt:
        name:
          - mysql-server
          - python3-pymysql
        state: present

    - name: Ensure MySQL is running and enabled
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: true

    - name: Bind MySQL to all interfaces (reachable from the app subnet)
      ansible.builtin.lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
      notify: Restart MySQL

    - name: Check whether root credentials file already exists
      ansible.builtin.stat:
        path: /root/.my.cnf
      register: root_my_cnf

    - name: Set MySQL root password (first run, via auth socket)
      community.mysql.mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        host: localhost
        login_unix_socket: /var/run/mysqld/mysqld.sock
        state: present
      when: not root_my_cnf.stat.exists

    - name: Write root credentials file for idempotent re-runs
      ansible.builtin.copy:
        dest: /root/.my.cnf
        owner: root
        group: root
        mode: "0600"
        content: |
          [client]
          user=root
          password={{ mysql_root_password }}

    - name: Create application database
      community.mysql.mysql_db:
        name: "{{ mysql_database }}"
        state: present

    - name: Create application user (accessible from the VNet/VPC)
      community.mysql.mysql_user:
        name: "{{ mysql_app_user }}"
        password: "{{ mysql_app_password }}"
        host: "%"
        priv: "{{ mysql_database }}.*:ALL"
        state: present

  handlers:
    - name: Restart MySQL
      ansible.builtin.service:
        name: mysql
        state: restarted
