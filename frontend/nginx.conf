# nginx serves the built React app and proxies /api to the backend.
# BACKEND_URL is substituted at container start (see Dockerfile entrypoint).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router: send unknown paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + actuator calls to the Spring Boot backend
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /actuator/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
    }
}
