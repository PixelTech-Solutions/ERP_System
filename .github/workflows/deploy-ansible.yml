name: "Deploy ERP (Ansible)"

# Builds the backend JAR and deploys the full app to already-provisioned
# servers using Ansible. Trigger manually after the infrastructure
# (ERP_Infra) Terraform Apply has created the servers.
#
# Pipeline:  build  ->  configure-database  ->  deploy-application  ->  smoke-test

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Target cloud"
        type: choice
        options: [azure, aws]
        default: azure
      environment:
        description: "Target environment"
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  contents: read

# Host IPs are stored once as repository variables and resolved by
# cloud + environment, so you never have to type them in.
#   AZURE_DEV_APP_HOST / AZURE_DEV_DB_HOST / AZURE_DEV_DB_PRIVATE_IP
#   AZURE_PROD_APP_HOST / AZURE_PROD_DB_HOST / AZURE_PROD_DB_PRIVATE_IP
#   AWS_DEV_APP_HOST   / AWS_DEV_DB_HOST   / AWS_DEV_DB_PRIVATE_IP
#   AWS_PROD_APP_HOST  / AWS_PROD_DB_HOST  / AWS_PROD_DB_PRIVATE_IP

jobs:
  # 0) Resolve the target host IPs and SSH user once, expose to downstream jobs.
  resolve:
    name: Resolve target hosts
    runs-on: ubuntu-latest
    outputs:
      ssh_user: ${{ steps.pick.outputs.ssh_user }}
      app_host: ${{ steps.pick.outputs.app_host }}
      db_host: ${{ steps.pick.outputs.db_host }}
      db_private_ip: ${{ steps.pick.outputs.db_private_ip }}
    steps:
      - name: Pick variables for ${{ inputs.cloud }}/${{ inputs.environment }}
        id: pick
        env:
          AZURE_DEV_APP_HOST: ${{ vars.AZURE_DEV_APP_HOST }}
          AZURE_DEV_DB_HOST: ${{ vars.AZURE_DEV_DB_HOST }}
          AZURE_DEV_DB_PRIVATE_IP: ${{ vars.AZURE_DEV_DB_PRIVATE_IP }}
          AZURE_PROD_APP_HOST: ${{ vars.AZURE_PROD_APP_HOST }}
          AZURE_PROD_DB_HOST: ${{ vars.AZURE_PROD_DB_HOST }}
          AZURE_PROD_DB_PRIVATE_IP: ${{ vars.AZURE_PROD_DB_PRIVATE_IP }}
          AWS_DEV_APP_HOST: ${{ vars.AWS_DEV_APP_HOST }}
          AWS_DEV_DB_HOST: ${{ vars.AWS_DEV_DB_HOST }}
          AWS_DEV_DB_PRIVATE_IP: ${{ vars.AWS_DEV_DB_PRIVATE_IP }}
          AWS_PROD_APP_HOST: ${{ vars.AWS_PROD_APP_HOST }}
          AWS_PROD_DB_HOST: ${{ vars.AWS_PROD_DB_HOST }}
          AWS_PROD_DB_PRIVATE_IP: ${{ vars.AWS_PROD_DB_PRIVATE_IP }}
        run: |
          cloud="${{ inputs.cloud }}"
          env="${{ inputs.environment }}"
          prefix="$(echo "${cloud}_${env}" | tr '[:lower:]' '[:upper:]')"

          ssh_user=azureuser
          if [ "$cloud" = "aws" ]; then ssh_user=ubuntu; fi

          app_host_var="${prefix}_APP_HOST"
          db_host_var="${prefix}_DB_HOST"
          db_private_ip_var="${prefix}_DB_PRIVATE_IP"

          app_host="${!app_host_var}"
          db_host="${!db_host_var}"
          db_private_ip="${!db_private_ip_var}"

          if [ -z "$app_host" ] || [ -z "$db_host" ] || [ -z "$db_private_ip" ]; then
            echo "Missing repo variables for ${prefix}_*. Define them under Settings -> Variables." >&2
            echo "  ${app_host_var}=$app_host"
            echo "  ${db_host_var}=$db_host"
            echo "  ${db_private_ip_var}=$db_private_ip"
            exit 1
          fi

          echo "Resolved $cloud/$env -> ssh_user=$ssh_user app=$app_host db=$db_host db_priv=$db_private_ip"
          {
            echo "ssh_user=$ssh_user"
            echo "app_host=$app_host"
            echo "db_host=$db_host"
            echo "db_private_ip=$db_private_ip"
          } >> "$GITHUB_OUTPUT"

  # 1) Build backend + frontend artifacts.
  build:
    name: Build backend and frontend artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn -q clean package -DskipTests

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend dist
        working-directory: frontend
        run: |
          npm ci
          npm run build
          tar -C dist -czf ../frontend-dist.tar.gz .

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: erp-backend-jar
          path: backend/target/erp-system-1.0.0.jar
          retention-days: 1

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: erp-frontend-dist
          path: frontend-dist.tar.gz
          retention-days: 1

  # 2) Install MySQL and create the database/user on the DB server.
  configure-database:
    name: Configure database server
    needs: [resolve, build]
    runs-on: ubuntu-latest
    env:
      SSH_USER: ${{ needs.resolve.outputs.ssh_user }}
      APP_HOST: ${{ needs.resolve.outputs.app_host }}
      DB_HOST: ${{ needs.resolve.outputs.db_host }}
      DB_PRIVATE_IP: ${{ needs.resolve.outputs.db_private_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass
          ansible-galaxy collection install community.mysql

      - name: Generate inventory
        working-directory: ansible
        run: |
          mkdir -p inventory
          cat > inventory/hosts.ini <<EOF
          [app]
          app-server ansible_host=${APP_HOST}

          [db]
          db-server ansible_host=${DB_HOST}

          [all:vars]
          ansible_user=${SSH_USER}
          ansible_ssh_common_args=-o StrictHostKeyChecking=no
          db_private_ip=${DB_PRIVATE_IP}
          mysql_database=erpdb
          mysql_app_user=erp_app
          EOF

      - name: Wait for SSH on DB host
        run: |
          for i in $(seq 1 30); do
            if nc -z -w 5 ${DB_HOST} 22; then
              echo "SSH reachable on DB host"; exit 0
            fi
            echo "waiting for SSH... ($i)"; sleep 10
          done
          echo "Timed out waiting for SSH"; exit 1

      - name: Run db.yml playbook
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook playbooks/db.yml \
            --extra-vars "ansible_password=${{ secrets.VM_ADMIN_PASSWORD }} \
                          ansible_become_pass=${{ secrets.VM_ADMIN_PASSWORD }} \
                          mysql_root_password=${{ secrets.MYSQL_ROOT_PASSWORD }} \
                          mysql_app_password=${{ secrets.MYSQL_APP_PASSWORD }}"

  # 3) Install Java/nginx, drop in the JAR, and start the backend service.
  deploy-application:
    name: Deploy application server
    needs: [resolve, configure-database]
    runs-on: ubuntu-latest
    env:
      SSH_USER: ${{ needs.resolve.outputs.ssh_user }}
      APP_HOST: ${{ needs.resolve.outputs.app_host }}
      DB_HOST: ${{ needs.resolve.outputs.db_host }}
      DB_PRIVATE_IP: ${{ needs.resolve.outputs.db_private_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: erp-backend-jar
          path: ansible/files

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: erp-frontend-dist
          path: ansible/files

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass
          ansible-galaxy collection install community.mysql

      - name: Generate inventory
        working-directory: ansible
        run: |
          mkdir -p inventory
          cat > inventory/hosts.ini <<EOF
          [app]
          app-server ansible_host=${APP_HOST}

          [db]
          db-server ansible_host=${DB_HOST}

          [all:vars]
          ansible_user=${SSH_USER}
          ansible_ssh_common_args=-o StrictHostKeyChecking=no
          db_private_ip=${DB_PRIVATE_IP}
          mysql_database=erpdb
          mysql_app_user=erp_app
          EOF

      - name: Wait for SSH on app host
        run: |
          for i in $(seq 1 30); do
            if nc -z -w 5 ${APP_HOST} 22; then
              echo "SSH reachable on app host"; exit 0
            fi
            echo "waiting for SSH... ($i)"; sleep 10
          done
          echo "Timed out waiting for SSH"; exit 1

      - name: Run app.yml playbook
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook playbooks/app.yml \
            --extra-vars "ansible_password=${{ secrets.VM_ADMIN_PASSWORD }} \
                          ansible_become_pass=${{ secrets.VM_ADMIN_PASSWORD }} \
                          db_password=${{ secrets.MYSQL_APP_PASSWORD }}"

  # 4) Verify both API health and frontend home page.
  smoke-test:
    name: Smoke test
    needs: [resolve, deploy-application]
    runs-on: ubuntu-latest
    env:
      APP_HOST: ${{ needs.resolve.outputs.app_host }}
    steps:
      - name: Check actuator health
        run: |
          for i in $(seq 1 12); do
            body=$(curl -fsS "http://${APP_HOST}/actuator/health" || true)
            echo "attempt $i: $body"
            if echo "$body" | grep -q '"status":"UP"'; then
              echo "App is healthy"; break
            fi
            sleep 10
            if [ "$i" -eq 12 ]; then
              echo "App did not become healthy in time"; exit 1
            fi
          done

      - name: Check frontend home page
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /tmp/home.html -w "%{http_code}" "http://${APP_HOST}/" || true)
            echo "attempt $i: status=$code"
            if [ "$code" = "200" ] && grep -qi "<html" /tmp/home.html; then
              echo "Frontend is reachable"; exit 0
            fi
            sleep 10
          done
          echo "Frontend did not become reachable in time"; exit 1
